<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel SweetCakepremuim</title>

<style>
body{
    font-family:Arial;
    background:#f8fafc;
    padding:20px;
}

h1, h2{
    color:#e91e63;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    background:#e91e63;
    color:white;
    border:none;
    padding:10px;
    cursor:pointer;
    margin:3px;
}

.produto{
    background:white;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
}

.editar{
    background:#2563eb;
}

.excluir{
    background:#dc2626;
}
</style>
</head>
<body>

<h1>📦 Painel Administrativo</h1>

<input type="hidden" id="editandoIndex">

<label><b>Nome do produto</b></label>
<input type="text" id="nome" placeholder="Ex: Brigadeiro">
<label><b>Descrição do produto</b></label>
<textarea id="descricao" placeholder="Ex: Brigadeiro gourmet feito com chocolate nobre"></textarea>
<label><b>Preço</b></label>
<input type="number" id="preco" placeholder="Ex: 5,00">

<label><b>Estoque disponível</b></label>
<input type="number" id="estoque" placeholder="Ex: 30">
<input type="file" id="foto" accept="image/*">

<label><input type="checkbox" id="destaque"> Produto em Destaque</label>
<br><br>

<label><input type="checkbox" id="promocao"> Promoção da Semana</label>
<br><br>

<label><input type="checkbox" id="promocaoDia"> Promoção do Dia</label>
<br><br>

<label><input type="checkbox" id="ativo" checked> Produto Ativo</label>

<select id="categoria">
    <option>Doces e Sobremesas</option>
    <option>Salgados</option>
    <option>Kits Festa</option>
    <option>Bebidas</option>
    <option>Mercearia</option>
    <option>Combos</option>
</select>

<button onclick="salvarProduto()" id="botaoSalvar">Salvar Produto</button>
<button onclick="cancelarEdicao()" type="button">Cancelar Edição</button>
<hr>
<h2>📋 Produtos Cadastrados</h2>
<div id="listaProdutos"></div>
<hr>

<h2>🕒 Status da Loja</h2>

<select id="controleStatusLoja">
    <option value="automatico">Automático</option>
    <option value="aberto">Forçar Aberto</option>
    <option value="fechado">Forçar Fechado</option>
</select>

<button onclick="salvarStatusLoja()">Salvar Status</button>

<hr>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR_Cs8eI54zyfFfDKU4tneY6sYs5KOwWU",
  authDomain: "sweetcake-cardapio.firebaseapp.com",
  projectId: "sweetcake-cardapio",
  storageBucket: "sweetcake-cardapio.firebasestorage.app",
  messagingSenderId: "69352116515",
  appId: "1:69352116515:web:c02c6d3a5df9e6d9c4bc96"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let produtos = JSON.parse(localStorage.getItem("produtosSweetCake")) || [];

function salvarProduto(){
    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const estoque = document.getElementById("estoque").value;
    const categoria = document.getElementById("categoria").value;
    const destaque = document.getElementById("destaque").checked;
    const promocao = document.getElementById("promocao").checked;
    const promocaoDia = document.getElementById("promocaoDia").checked;
    const ativo = document.getElementById("ativo").checked;
    const fotoInput = document.getElementById("foto");
    const editandoIndex = document.getElementById("editandoIndex").value;

    if(nome === "" || preco === ""){
        alert("Preencha o nome e o preço do produto.");
        return;
    }

    if(fotoInput.files.length > 0){
        redimensionarFoto(fotoInput.files[0], function(fotoReduzida){
            salvarProdutoFinal(nome, descricao, preco, estoque, categoria, destaque, promocao, promocaoDia, ativo, fotoReduzida, editandoIndex);
        });
    }else{
        let fotoAntiga = "";

        if(editandoIndex !== ""){
            fotoAntiga = produtos[editandoIndex].foto || "";
        }

        salvarProdutoFinal(nome, descricao, preco, estoque, categoria, destaque, promocao, promocaoDia, ativo, fotoAntiga, editandoIndex);
    }
}

function redimensionarFoto(arquivo, callback){
    var leitor = new FileReader();

    leitor.onload = function(event){
        var img = new Image();

        img.onload = function(){
            var canvas = document.createElement("canvas");

            var largura = 500;
            var altura = (img.height * largura) / img.width;

            canvas.width = largura;
            canvas.height = altura;

            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, largura, altura);

            callback(canvas.toDataURL("image/jpeg", 0.7));
        };

        img.src = event.target.result;
    };

    leitor.readAsDataURL(arquivo);
}
function salvarProdutoFinal(nome, descricao, preco, estoque, categoria, destaque, promocao, promocaoDia, ativo, foto, editandoIndex){
        const produto = {
        nome: nome,
        descricao: descricao,
        preco: parseFloat(preco),
        estoque: Number(estoque) || 0,
        categoria: categoria,
        destaque: destaque,
        promocao: promocao,
        promocaoDia: promocaoDia,
        ativo: ativo,
        foto: foto
    };

    if(editandoIndex !== ""){
        produtos[editandoIndex] = produto;
        alert("Produto atualizado com sucesso!");
    }else{
        produtos.push(produto);
        alert("Produto salvo com sucesso!");
    }

    localStorage.setItem("produtosSweetCake", JSON.stringify(produtos));
salvarProdutosFirebase();

    limparCampos();
    atualizarLista();
}

function atualizarLista(){
    const lista = document.getElementById("listaProdutos");
    lista.innerHTML = "";

    if(produtos.length === 0){
        lista.innerHTML = "<p>Nenhum produto cadastrado.</p>";
        return;
    }

    produtos.forEach((produto, index) => {
        lista.innerHTML += `
            <div class="produto">
                ${produto.foto ? `<img src="${produto.foto}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">` : ""}
                <br>
                <b>${produto.nome}</b><br>
                Categoria: ${produto.categoria}<br>
                Preço: R$ ${Number(produto.preco).toFixed(2).replace(".", ",")}<br>
                Estoque: ${produto.estoque || 0}<br>
                Promoção da Semana: ${produto.promocao ? "Sim" : "Não"}<br>
                Promoção do Dia: ${produto.promocaoDia ? "Sim" : "Não"}<br>
                Destaque: ${produto.destaque ? "Sim" : "Não"}<br>
                Ativo: ${produto.ativo ? "Sim" : "Não"}<br><br>

                <button class="editar" onclick="editarProduto(${index})">Editar</button>
                <button class="excluir" onclick="excluirProduto(${index})">Excluir</button>
            </div>
        `;
    });
}

function editarProduto(index){
    const produto = produtos[index];

    document.getElementById("editandoIndex").value = index;
    document.getElementById("nome").value = produto.nome;
    document.getElementById("preco").value = produto.preco;
    document.getElementById("estoque").value = produto.estoque || 0;
    document.getElementById("categoria").value = produto.categoria;
    document.getElementById("destaque").checked = produto.destaque === true;
    document.getElementById("promocao").checked = produto.promocao === true;
    document.getElementById("promocaoDia").checked = produto.promocaoDia === true;
    document.getElementById("ativo").checked = produto.ativo === true;

    document.getElementById("botaoSalvar").innerText = "Atualizar Produto";

    window.scrollTo(0,0);
}

function cancelarEdicao(){
    limparCampos();
}

function excluirProduto(index){
    if(confirm("Deseja excluir este produto?")){
        produtos.splice(index, 1);
        localStorage.setItem("produtosSweetCake", JSON.stringify(produtos));
salvarProdutosFirebase();
        atualizarLista();
    }
}

function limparCampos(){
    document.getElementById("editandoIndex").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("estoque").value = "";
    document.getElementById("foto").value = "";
    document.getElementById("destaque").checked = false;
    document.getElementById("promocao").checked = false;
    document.getElementById("promocaoDia").checked = false;
    document.getElementById("ativo").checked = true;
    document.getElementById("botaoSalvar").innerText = "Salvar Produto";
}

function salvarStatusLoja(){
    var status = document.getElementById("controleStatusLoja").value;

    localStorage.setItem("statusLojaSweetCake", status);

    db.collection("sistema").doc("statusLoja").set({
        status: status
    }).then(function(){
        alert("Status da loja salvo!");
    });
}

document.getElementById("controleStatusLoja").value =
localStorage.getItem("statusLojaSweetCake") || "automatico";
document.getElementById("controleStatusLoja").value =
localStorage.getItem("statusLojaSweetCake") || "automatico";

function salvarProdutosFirebase(){
    db.collection("sistema").doc("produtos").set({
        lista: produtos
    });
}

db.collection("sistema").doc("produtos").get().then(function(doc){
    if(doc.exists){
        produtos = doc.data().lista || [];
        localStorage.setItem("produtosSweetCake", JSON.stringify(produtos));
        atualizarLista();
    }else{
        if(produtos.length > 0){
            salvarProdutosFirebase();
        }
    }
});

atualizarLista();
</script>

</body>
</html>
