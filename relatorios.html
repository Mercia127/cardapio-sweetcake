<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatórios - SweetCake</title>

<style>
body{
    font-family:Arial;
    background:#f8fafc;
    padding:20px;
    max-width:1000px;
    margin:auto;
}

h1{
    color:#e91e63;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    background:#e91e63;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    margin:5px;
    font-size:14px;
}

.imprimir{
    background:#16a34a;
}
</style>
</head>

<body>

<h1>📊 Relatórios SweetCake</h1>

<button class="imprimir" onclick="imprimirRelatorio()">🖨️ Imprimir Relatório</button>

<hr>

<div id="resumoRelatorio">Carregando relatório...</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR_Cs8eI54zyfFfDKU4tneY6sYs5KOwWU",
  authDomain: "sweetcake-cardapio.firebaseapp.com",
  projectId: "sweetcake-cardapio",
  storageBucket: "sweetcake-cardapio.firebasestorage.app",
  messagingSenderId: "69352116515",
  appId: "1:69352116515:web:c02c6d3a5df9e6d9c4bc96"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function moeda(valor){
    return Number(valor || 0).toFixed(2).replace(".", ",");
}

function numeroPedido(valor){
    return Number(String(valor || "0").replace(",", "."));
}

function carregarRelatorio(){
    var resumo = document.getElementById("resumoRelatorio");

    db.collection("pedidos").get().then(function(snapshot){
        var pedidos = [];

        snapshot.forEach(function(doc){
            var pedido = doc.data();
            pedidos.push(pedido);
        });

        montarRelatorio(pedidos);
    }).catch(function(error){
        resumo.innerHTML = "<p>Erro ao carregar relatório: " + error.message + "</p>";
    });
}

function montarRelatorio(pedidos){
    var resumo = document.getElementById("resumoRelatorio");

    var hoje = new Date().toLocaleDateString("pt-BR");
    var mesAtual = hoje.split("/")[1] + "/" + hoje.split("/")[2];

    var pedidosHoje = 0;
    var pedidosMes = 0;

    var totalHoje = 0;
    var totalMes = 0;

    var pixHoje = 0;
    var cartaoHoje = 0;
    var dinheiroHoje = 0;

    var clientesHoje = {};
    var clientesMes = {};

    var produtosVendidos = {};
    var clientesFrequentes = {};

    var canceladosHoje = 0;
    var canceladosMes = 0;

    for(var i = 0; i < pedidos.length; i++){
        var pedido = pedidos[i];

        var dataPedido = pedido.data || "";
        var mesPedido = dataPedido.split("/")[1] + "/" + dataPedido.split("/")[2];

        var total = numeroPedido(pedido.total);
        var telefone = String(pedido.telefone || "").replace(/\D/g,"");
        var nomeCliente = pedido.nome || "Cliente sem nome";

        if(!clientesFrequentes[nomeCliente]){
            clientesFrequentes[nomeCliente] = 0;
        }
        clientesFrequentes[nomeCliente]++;

        if(pedido.itens){
            for(var j = 0; j < pedido.itens.length; j++){
                var item = pedido.itens[j];

                if(!produtosVendidos[item.nome]){
                    produtosVendidos[item.nome] = 0;
                }

                produtosVendidos[item.nome] += Number(item.quantidade || 0);
            }
        }

        if(dataPedido === hoje){
            pedidosHoje++;

            if(telefone !== ""){
                clientesHoje[telefone] = true;
            }

            if(pedido.status === "Cancelado"){
                canceladosHoje++;
            }else{
                totalHoje += total;

                if(pedido.pagamento === "Pix"){
                    pixHoje += total;
                }

                if(pedido.pagamento === "Cartão"){
                    cartaoHoje += total;
                }

                if(pedido.pagamento === "Dinheiro"){
                    dinheiroHoje += total;
                }
            }
        }

        if(mesPedido === mesAtual){
            pedidosMes++;

            if(telefone !== ""){
                clientesMes[telefone] = true;
            }

            if(pedido.status === "Cancelado"){
                canceladosMes++;
            }else{
                totalMes += total;
            }
        }
    }

    var clientesUnicosHoje = Object.keys(clientesHoje).length;
    var clientesUnicosMes = Object.keys(clientesMes).length;

    var ticketMedioHoje = pedidosHoje > 0 ? totalHoje / pedidosHoje : 0;
    var ticketMedioMes = pedidosMes > 0 ? totalMes / pedidosMes : 0;

    var html =
        "<div class='card'>" +
        "<h2>Resumo de Hoje</h2>" +
        "<p><b>Data:</b> " + hoje + "</p>" +
        "<p><b>Pedidos:</b> " + pedidosHoje + "</p>" +
        "<p><b>Clientes únicos:</b> " + clientesUnicosHoje + "</p>" +
        "<p><b>Faturamento:</b> R$ " + moeda(totalHoje) + "</p>" +
        "<p><b>Ticket médio:</b> R$ " + moeda(ticketMedioHoje) + "</p>" +
        "<p><b>Cancelados:</b> " + canceladosHoje + "</p>" +
        "</div>" +

        "<div class='card'>" +
        "<h2>Pagamento de Hoje</h2>" +
        "<p><b>Pix:</b> R$ " + moeda(pixHoje) + "</p>" +
        "<p><b>Cartão:</b> R$ " + moeda(cartaoHoje) + "</p>" +
        "<p><b>Dinheiro:</b> R$ " + moeda(dinheiroHoje) + "</p>" +
        "</div>" +

        "<div class='card'>" +
        "<h2>Resumo do Mês</h2>" +
        "<p><b>Mês:</b> " + mesAtual + "</p>" +
        "<p><b>Pedidos:</b> " + pedidosMes + "</p>" +
        "<p><b>Clientes únicos:</b> " + clientesUnicosMes + "</p>" +
        "<p><b>Faturamento:</b> R$ " + moeda(totalMes) + "</p>" +
        "<p><b>Ticket médio:</b> R$ " + moeda(ticketMedioMes) + "</p>" +
        "<p><b>Cancelados:</b> " + canceladosMes + "</p>" +
        "</div>";

    html += montarRanking("Produtos Mais Vendidos", produtosVendidos, "unidade(s)");
    html += montarRanking("Clientes Mais Frequentes", clientesFrequentes, "pedido(s)");

    resumo.innerHTML = html;
}

function montarRanking(titulo, objeto, texto){
    var lista = [];

    for(var nome in objeto){
        lista.push({
            nome: nome,
            quantidade: objeto[nome]
        });
    }

    lista.sort(function(a, b){
        return b.quantidade - a.quantidade;
    });

    var html = "<div class='card'><h2>" + titulo + "</h2>";

    if(lista.length === 0){
        html += "<p>Nenhum dado ainda.</p>";
    }else{
        for(var i = 0; i < lista.length && i < 10; i++){
            html += "<p><b>" + (i + 1) + "º " + lista[i].nome + ":</b> " + lista[i].quantidade + " " + texto + "</p>";
        }
    }

    html += "</div>";

    return html;
}

function imprimirRelatorio(){
    document.querySelector(".imprimir").style.display = "none";
    window.print();
    document.querySelector(".imprimir").style.display = "inline-block";
}

carregarRelatorio();
</script>

</body>
</html>
