<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos do Dia - SweetCake</title>

<style>
body{
    font-family:Arial;
    background:#f8fafc;
    padding:20px;
}

h1{
    color:#e91e63;
}

.pedido{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    background:#e91e63;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    margin:3px;
}

.imprimir{
    background:#16a34a;
}

.cancelar{
    background:#dc2626;
}

.status{
    font-weight:bold;
    color:#2563eb;
}
</style>
</head>
<body>

<h1>📋 Pedidos do Dia</h1>

<input
id="buscaTelefone"
type="text"
placeholder="Buscar por telefone..."
onkeyup="filtrarTelefone()"
style="width:300px;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;">

<button onclick="window.location.href='index.html'">Voltar para o Cardápio</button>
<button class="cancelar" onclick="zerarPedidosDoDia()">🗑️ Zerar Pedidos do Dia</button>

<hr>

<div id="listaPedidos"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAR_Cs8eI54zyfFfDKU4tneY6sYs5KOwWU",
  authDomain: "sweetcake-cardapio.firebaseapp.com",
  projectId: "sweetcake-cardapio",
  storageBucket: "sweetcake-cardapio.firebasestorage.app",
  messagingSenderId: "69352116515",
  appId: "1:69352116515:web:c02c6d3a5df9e6d9c4bc96"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
var pedidos = [];
var quantidadePedidosAnterior = 0;
function textoClienteRecorrente(numero){
    numero = Number(numero || 1);

    if(numero <= 1){
        return "Primeira compra";
    }

    return numero + "ª compra";
}
function carregarPedidos(){
    var lista = document.getElementById("listaPedidos");
    lista.innerHTML = "";

    if(pedidos.length === 0){
        lista.innerHTML = "<p>Nenhum pedido hoje.</p>";
        return;
    }

    for(var i = pedidos.length - 1; i >= 0; i--){
        var pedido = pedidos[i];

        lista.innerHTML +=
            "<div class='pedido'>" +
            "<h2>Pedido #" + pedido.numero + "</h2>" +
            "<p><b>Data:</b> " + (pedido.data || "") + "</p>" +
            "<p><b>Horário:</b> " + (pedido.horario || "") + "</p>" +
            "<p><b>Cliente:</b> " + (pedido.nome || "") + "</p>" +
            "<p><b>Cliente recorrente:</b> " + textoClienteRecorrente(pedido.pedidosCliente || 1) + "</p>" +
            "<p><b>Telefone:</b> " + (pedido.telefone || "") + "</p>" +
            "<p><b>Tipo:</b> " + (pedido.tipoEntrega || "") + "</p>" +
            "<p><b>Endereço:</b> " + (pedido.endereco || "") + "</p>" +
            "<p><b>Pagamento:</b> " + (pedido.pagamento || "") + "</p>" +
            "<p><b>Subtotal:</b> R$ " + (pedido.subtotal || "0,00") + "</p>" +
            "<p><b>Entrega:</b> R$ " + (pedido.entrega || "0,00") + "</p>" +
            "<h3>Total: R$ " + (pedido.total || "0,00") + "</h3>" +
            "<p class='status'>Status: " + (pedido.status || "Recebido") + "</p>" +
            "<button onclick='verPedido(" + i + ")'>Ver</button>" +
            "<button onclick='abrirWhatsApp(" + i + ")'>WhatsApp</button>" +
            "<button class='imprimir' onclick='imprimirPedido(" + i + ")'>Imprimir</button>" +
            "<button onclick='mudarStatus(" + i + ", \"Preparando\")'>Preparando</button>" +
            "<button onclick='mudarStatus(" + i + ", \"Entregue\")'>Entregue</button>" +
            "<button class='cancelar' onclick='mudarStatus(" + i + ", \"Cancelado\")'>Cancelar</button>" +
            "</div>";
    }
}

function verPedido(index){
    var pedido = pedidos[index];

    var texto = "Pedido #" + pedido.numero + "\n";
    texto += "Pedido do cliente: #" + (pedido.pedidosCliente || 1) + "\n";
    texto += "Data: " + (pedido.data || "") + "\n";
    texto += "Horário: " + (pedido.horario || "") + "\n";
    texto += "Cliente: " + (pedido.nome || "") + "\n";
    texto += "Telefone: " + (pedido.telefone || "") + "\n";
    texto += "Tipo: " + (pedido.tipoEntrega || "") + "\n";
    texto += "Endereço: " + (pedido.endereco || "") + "\n";
    texto += "Pagamento: " + (pedido.pagamento || "") + "\n\n";
    texto += "Itens:\n";

    for(var i = 0; i < pedido.itens.length; i++){
        texto += pedido.itens[i].quantidade + "x " + pedido.itens[i].nome + " - R$ " + pedido.itens[i].subtotal + "\n";
    }

    texto += "\nSubtotal: R$ " + pedido.subtotal;
    texto += "\nEntrega: R$ " + pedido.entrega;
    texto += "\nTotal: R$ " + pedido.total;

    if(pedido.observacao){
        texto += "\n\nObs: " + pedido.observacao;
    }

    alert(texto);
}

function imprimirPedido(index){
    var pedido = pedidos[index];

    var conteudo = "";
    conteudo += "<h2>SWEETCAKE</h2>";
    conteudo += "<h3>Pedido #" + pedido.numero + "</h3>";
    conteudo += "<p><b>Pedido do cliente:</b> #" + (pedido.pedidosCliente || 1) + "</p>";
    conteudo += "<p><b>Data:</b> " + (pedido.data || "") + "</p>";
    conteudo += "<p><b>Horário:</b> " + (pedido.horario || "") + "</p>";
    conteudo += "<hr>";
    conteudo += "<p><b>Cliente:</b> " + (pedido.nome || "") + "</p>";
    conteudo += "<p><b>Telefone:</b> " + (pedido.telefone || "") + "</p>";
    conteudo += "<p><b>Tipo:</b> " + (pedido.tipoEntrega || "") + "</p>";
    conteudo += "<p><b>Endereço:</b> " + (pedido.endereco || "") + "</p>";
    conteudo += "<p><b>Pagamento:</b> " + (pedido.pagamento || "") + "</p>";
    conteudo += "<hr>";
    conteudo += "<h3>Itens</h3>";

    for(var i = 0; i < pedido.itens.length; i++){
        conteudo += "<p>" + pedido.itens[i].quantidade + "x " + pedido.itens[i].nome + " - R$ " + pedido.itens[i].subtotal + "</p>";
    }

    conteudo += "<hr>";
    conteudo += "<p>Subtotal: R$ " + pedido.subtotal + "</p>";
    conteudo += "<p>Entrega: R$ " + pedido.entrega + "</p>";
    conteudo += "<h3>Total: R$ " + pedido.total + "</h3>";

    if(pedido.observacao){
        conteudo += "<p><b>Obs:</b> " + pedido.observacao + "</p>";
    }

    var janela = window.open("", "_blank");
    janela.document.write("<html><head><title>Imprimir Pedido</title></head><body>");
    janela.document.write(conteudo);
    janela.document.write("</body></html>");
    janela.document.close();
    janela.print();
}

function mudarStatus(index, novoStatus){
    pedidos[index].status = novoStatus;

    if(pedidos[index].idFirebase){
        db.collection("pedidos").doc(pedidos[index].idFirebase).update({
            status: novoStatus
        });
    }

    carregarPedidos();
}

function tocarSomPedido(){
    var audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.volume = 1;

    audio.play().catch(function(){
        alert("🔔 Novo pedido recebido!");
    });
}

function filtrarTelefone(){
    var busca = document.getElementById("buscaTelefone").value.toLowerCase();
    var pedidosTela = document.querySelectorAll(".pedido");

    for(var i = 0; i < pedidosTela.length; i++){
        var texto = pedidosTela[i].innerText.toLowerCase();

        if(texto.includes(busca)){
            pedidosTela[i].style.display = "block";
        }else{
            pedidosTela[i].style.display = "none";
        }
    }
}

function abrirWhatsApp(index){
    var pedido = pedidos[index];

    var telefone = String(pedido.telefone || "").replace(/\D/g,'');

    if(!telefone){
        alert("Telefone não informado");
        return;
    }

    window.open("https://wa.me/55" + telefone, "_blank");
}

var primeiraCargaPedidos = true;

db.collection("pedidos").onSnapshot(function(snapshot){
    var novosPedidos = [];

    snapshot.forEach(function(doc){
        var pedido = doc.data();
        pedido.idFirebase = doc.id;
        novosPedidos.push(pedido);
    });

    novosPedidos.sort(function(a, b){
        return Number(a.numero || 0) - Number(b.numero || 0);
    });

    var quantidadeAntes = pedidos.length;

    pedidos = novosPedidos;
    carregarPedidos();

    if(!primeiraCargaPedidos && pedidos.length > quantidadeAntes){
        tocarSomPedido();
        alert("Novo pedido recebido!");
    }

    primeiraCargaPedidos = false;

    console.log("Pedidos atualizados:", pedidos.length);
});

function zerarPedidosDoDia(){
    if(!confirm("Tem certeza que deseja apagar todos os pedidos do painel?")){
        return;
    }

    db.collection("pedidos").get().then(function(snapshot){
        var batch = db.batch();

        snapshot.forEach(function(doc){
            batch.delete(doc.ref);
        });

        return batch.commit();
    }).then(function(){
        localStorage.removeItem("pedidosSweetCake");
        pedidos = [];
        carregarPedidos();
        alert("Pedidos do dia zerados com sucesso!");
    }).catch(function(error){
        alert("Erro ao zerar pedidos: " + error.message);
    });
}
</script>

</body>
</html>
