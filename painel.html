<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel SweetCake</title>

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    height:100vh;
    background:#f8fafc;
}

.menu{
    width:230px;
    background:#1e293b;
    padding:20px;
    color:white;
}

.menu h2{
    color:#fff;
    margin-bottom:20px;
}

.menu button{
    width:100%;
    margin-bottom:10px;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#e91e63;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.menu button:hover{
    background:#c2185b;
}

.tela{
    flex:1;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
.piscando{
    animation: piscar 1s infinite;
    background:#dc2626 !important;
}

@keyframes piscar{
    0%{ opacity:1; }
    50%{ opacity:0.4; }
    100%{ opacity:1; }
}
</style>
</head>

<body>

<div class="menu">
    <h2>🍰 SweetCake</h2>

<button id="btnPedidos" onclick="abrirPedidos()">📋 Pedidos do Dia</button>
<button onclick="abrirTela('admin.html')">📦 Produtos / Admin</button>
<button onclick="abrirTela('relatorios.html')">📊 Relatórios</button>
<button onclick="abrirTela('index.html')">🛍️ Ver Cardápio</button>
<button onclick="abrirTela('admin.html#backup')">💾 Backup</button>
<select id="statusRapido">
    <option value="automatico">Automático</option>
    <option value="aberto">Aberto</option>
    <option value="fechado">Fechado</option>
</select>

<button onclick="salvarStatusRapido()">🕒 Alterar Status</button>
</div>

<div class="tela">
    <iframe id="telaSistema" src="pedidos.html"></iframe>
</div>

<script>
var pedidosAnterior = JSON.parse(localStorage.getItem("pedidosSweetCake")) || [];
var quantidadePedidosAnterior = pedidosAnterior.length;

function abrirTela(pagina){
    document.getElementById("telaSistema").src = pagina;
}

function abrirPedidos(){
    document.getElementById("telaSistema").src = "pedidos.html";
    document.getElementById("btnPedidos").classList.remove("piscando");
    document.title = "Painel SweetCake";
}

function tocarSomPedido(){
    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function bip(tempo){
        setTimeout(function(){
            var oscillator = audioCtx.createOscillator();
            var gainNode = audioCtx.createGain();

            oscillator.type = "square";
            oscillator.frequency.value = 900;

            gainNode.gain.value = 1;

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.25);
        }, tempo);
    }

    bip(0);
    bip(400);
    bip(800);
}
function verificarNovoPedidoPainel(){
    var pedidosAtualizados = JSON.parse(localStorage.getItem("pedidosSweetCake")) || [];

    if(pedidosAtualizados.length > quantidadePedidosAnterior){
        quantidadePedidosAnterior = pedidosAtualizados.length;

        document.getElementById("btnPedidos").classList.add("piscando");
        document.title = "🔴 NOVO PEDIDO";

        tocarSomPedido();
    }
}
function salvarStatusRapido(){
    var status = document.getElementById("statusRapido").value;

    db.collection("sistema").doc("statusLoja").set({
        status: status
    }).then(function(){
        alert("Status da loja alterado!");

        var iframe = document.getElementById("telaSistema");
        iframe.src = iframe.src;
    }).catch(function(error){
        alert("Erro ao alterar status: " + error.message);
    });
}
setInterval(verificarNovoPedidoPainel, 3000);
</script>

</body>
</html>
